name: Deploy to S3

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          ANCHOR_CMS_API_BASE: ${{ vars.ANCHOR_CMS_API_BASE }}
          ANCHOR_CMS_SITE_ID: bannister-communications
        run: npm run build
        
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          
      - name: Sync files to S3
        run: |
          aws s3 sync _site/ s3://bannistercommunications --delete --exclude ".DS_Store"
          
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation --distribution-id E3KB8JOG7W9DQD --paths "/*"
